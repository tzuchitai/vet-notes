<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🐾 獸醫讀書筆記</title>
  <style>
    :root {
      --gold:   #c8962a;
      --gold-lt:#f0c84a;
      --gold-dk:#8a6010;
      --gold-bg:#fdf6e3;
      --dark:   #2c1f00;
      --text:   #4a3800;
      --border: #e8d5a0;
      --bg:     #fdfaf2;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, "Segoe UI", "Noto Sans TC", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: linear-gradient(135deg, #fff8e8 0%, #fdf0c8 100%);
      border-bottom: 3px solid var(--gold);
      color: var(--dark);
      padding: 52px 24px 44px;
      text-align: center;
    }
    .header-paw { font-size: 2.8rem; margin-bottom: 12px; }
    header h1 { font-size: 2rem; font-weight: 800; letter-spacing: .02em; color: var(--gold-dk); }
    header p  { margin-top: 8px; opacity: .6; font-size: .97rem; color: var(--text); }
    .search-wrap {
      margin: 24px auto 0;
      max-width: 420px;
      position: relative;
    }
    .search-wrap input {
      width: 100%;
      padding: 13px 20px 13px 46px;
      border-radius: 50px;
      border: 2px solid var(--border);
      font-size: 1rem;
      background: #fff;
      color: var(--dark);
      outline: none;
    }
    .search-wrap input:focus { border-color: var(--gold); }
    .search-wrap input::placeholder { color: #c8a850; opacity: .7; }
    .search-wrap .search-icon {
      position: absolute; left: 16px; top: 50%;
      transform: translateY(-50%);
      font-size: 1rem; opacity: .6;
    }

    /* ── CONTAINER ── */
    .container { max-width: 900px; margin: 0 auto; padding: 36px 20px 80px; }

    /* ── SECTION LABEL ── */
    .section-label {
      font-size: .78rem; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; color: var(--text);
      opacity: .55; margin: 32px 0 14px;
    }

    /* ── CARDS GRID ── */
    .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,.07);
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      display: flex; flex-direction: column;
      transition: transform .18s, box-shadow .18s;
      border: 1px solid var(--border);
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,.12);
    }
    .card-top {
      height: 7px;
    }
    .card-body { padding: 20px 20px 16px; flex: 1; }
    .card-icon { font-size: 2rem; margin-bottom: 10px; }
    .card-title { font-size: 1.05rem; font-weight: 700; color: var(--dark); margin-bottom: 6px; }
    .card-desc  { font-size: .85rem; color: var(--text); opacity: .75; line-height: 1.55; }
    .card-footer {
      padding: 10px 20px 14px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .card-date  { font-size: .76rem; color: var(--text); opacity: .5; }
    .card-arrow {
      font-size: .85rem; color: #fff;
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── COMING SOON CARD ── */
    .card-soon {
      background: #fffdf5;
      border: 2px dashed var(--border);
      box-shadow: none;
      cursor: default;
    }
    .card-soon:hover { transform: none; box-shadow: none; }
    .card-soon .card-title { opacity: .45; }
    .card-soon .card-desc  { opacity: .4; }
    .coming-badge {
      font-size: .7rem; font-weight: 700;
      background: var(--border); color: var(--text);
      border-radius: 20px; padding: 2px 10px; opacity: .6;
    }

    /* ── ADD BUTTON ── */
    .add-card {
      background: #fff;
      border-radius: 16px;
      border: 2px dashed var(--border);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px 20px;
      text-align: center; cursor: pointer;
      color: var(--text); opacity: .5;
      transition: opacity .2s;
    }
    .add-card:hover { opacity: .9; }
    .add-card .plus { font-size: 1.8rem; margin-bottom: 8px; }
    .add-card span  { font-size: .88rem; font-weight: 600; }

    /* ── STATS BAR ── */
    .stats {
      display: flex; gap: 20px; flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .stat {
      background: #fff; border-radius: 12px;
      padding: 14px 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
      flex: 1; min-width: 120px; text-align: center;
    }
    .stat-num  { font-size: 1.6rem; font-weight: 800; color: var(--gold); }
    .stat-label{ font-size: .75rem; opacity: .55; margin-top: 2px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      header h1 { font-size: 1.5rem; }
      .header-paw { font-size: 2rem; }
      .container { padding: 20px 14px 60px; }
      .cards { grid-template-columns: 1fr 1fr; gap: 12px; }
      .card-title { font-size: .92rem; }
      .card-desc  { display: none; }
      .stats { gap: 10px; }
      .stat { padding: 12px 14px; }
    }
    @media (max-width: 380px) {
      .cards { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-paw">🐾</div>
  <h1>獸醫讀書筆記</h1>
  <p>Veterinary Study Notes</p>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search-input" placeholder="搜尋科目..." />
  </div>
</header>

<div class="container">

  <!-- Stats -->
  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="note-count">3</div>
      <div class="stat-label">筆記數量</div>
    </div>
    <div class="stat">
      <div class="stat-num">2026</div>
      <div class="stat-label">更新年份</div>
    </div>
    <div class="stat">
      <div class="stat-num">🐕🐱</div>
      <div class="stat-label">犬貓小動物</div>
    </div>
  </div>

  <div class="section-label">📚 我的筆記</div>

  <div class="cards" id="cards-container">

    <!-- ── 輸血醫學 ── -->
    <a class="card" href="notes/blood-transfusion.html" data-title="輸血醫學 休克 血液 transfusion">
      <div class="card-top" style="background:linear-gradient(90deg,#c8962a,#e8b84b)"></div>
      <div class="card-body">
        <div class="card-icon">🩸</div>
        <div class="card-title">輸血醫學與休克復甦</div>
        <div class="card-desc">體液生理、氧氣輸送、輸液策略、血製品選擇、血型配對、輸血反應</div>
      </div>
      <div class="card-footer">
        <span class="card-date">2026-05-17</span>
        <span class="card-arrow" style="background:#c8962a">→</span>
      </div>
    </a>

    <!-- ── 住院護理 ── -->
    <a class="card" href="notes/hospitalized-care.html" data-title="住院 護理 監控 生命徵象 輸液 輸血 呼吸 hospitalized nursing">
      <div class="card-top" style="background:linear-gradient(90deg,#0891b2,#2563eb)"></div>
      <div class="card-body">
        <div class="card-icon">🏥</div>
        <div class="card-title">住院伴侶動物護理與監控技術</div>
        <div class="card-desc">獸醫護理流程、生命徵象監測、輸液治療、輸血療法、呼吸急救、RER計算</div>
      </div>
      <div class="card-footer">
        <span class="card-date">2026-06-14</span>
        <span class="card-arrow" style="background:#0891b2">→</span>
      </div>
    </a>

    <!-- ── 牙科麻醉 ── -->
    <div class="card card-soon" data-title="牙科 麻醉 dental">
      <div class="card-top" style="background:linear-gradient(90deg,#c8962a,#e8b84b)"></div>
      <div class="card-body">
        <div class="card-icon">🦷</div>
        <div class="card-title">牙科麻醉與止痛</div>
        <div class="card-desc">無麻醉洗牙風險、術前評估、插管、神經阻斷、多模式鎮痛</div>
      </div>
      <div class="card-footer">
        <span class="coming-badge">即將上線</span>
      </div>
    </div>

    <!-- ── 加入新筆記 ── -->
    <div class="add-card" id="add-btn" onclick="showAddInfo()">
      <div class="plus">＋</div>
      <span>新增筆記</span>
    </div>

  </div>

  <!-- 新增說明 (隱藏) -->
  <div id="add-info" style="display:none; margin-top:16px; background:#fff; border-radius:12px; padding:18px 20px; font-size:.88rem; border-left:4px solid var(--blue); color:var(--dark);">
    📌 把新的 <strong>.html</strong> 筆記檔放進 <code>notes/</code> 資料夾，再在 index.html 新增一張卡片即可。
  </div>

</div>

<script>
  // ── 搜尋 ──
  const input = document.getElementById('search-input');
  input.addEventListener('input', () => {
    const q = input.value.toLowerCase();
    document.querySelectorAll('.card').forEach(card => {
      const text = (card.dataset.title || '') + ' ' + (card.textContent || '');
      card.style.display = text.toLowerCase().includes(q) ? '' : 'none';
    });
  });

  // ── 新增說明 ──
  function showAddInfo() {
    const el = document.getElementById('add-info');
    el.style.display = el.style.display === 'none' ? 'block' : 'none';
  }
</script>

</body>
</html>
